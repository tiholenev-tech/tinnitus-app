name: Deploy to droplet (auralis)

# Авто-деплой: при merge/push в main → SSH в droplet-а → git sync.
# Тихол не пуска нищо ръчно. Аудиото НЕ се пипа тук (то е rsync, отделно и рядко).
# Еднократна настройка на секретите: .github/DEPLOY_SETUP.md

on:
  push:
    branches: [main]
  workflow_dispatch: {}          # ръчен бутон "Run workflow" в раздел Actions

concurrency:
  group: deploy-auralis-production
  cancel-in-progress: false      # не прекъсвай текущ деплой по средата

jobs:
  deploy:
    name: git sync on droplet
    runs-on: ubuntu-latest
    steps:
      - name: SSH → /var/www/auralis → sync to origin/main
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script_stop: true       # спри при първа грешка
          script: |
            set -e
            cd /var/www/auralis
            git fetch --prune origin main
            # reset --hard гарантира, че сървърът = точно origin/main.
            # НЕ пипа untracked файлове → аудио директориите (library_staging_*)
            # остават недокоснати. НЕ ползваме git clean.
            git reset --hard origin/main
            echo "Deployed $(git rev-parse --short HEAD) at $(date -u +%FT%TZ)"
