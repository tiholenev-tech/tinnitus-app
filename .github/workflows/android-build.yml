name: Android APK Build

on:
  push:
    branches: [ main ]
    paths:
      - 'mobile/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'mobile/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:        # ръчно пускане от GitHub UI (Actions → Run workflow)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'mobile/package-lock.json'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        working-directory: mobile
        run: npm ci

      - name: Capacitor sync
        working-directory: mobile
        run: npx cap sync android

      - name: Grant execute on gradlew
        working-directory: mobile/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug

      - name: Collect APK
        run: |
          mkdir -p artifacts
          cp mobile/android/app/build/outputs/apk/debug/app-debug.apk artifacts/AURALIS-debug.apk

      - uses: actions/upload-artifact@v4
        with:
          name: AURALIS-APK
          path: artifacts/AURALIS-debug.apk
          retention-days: 30
