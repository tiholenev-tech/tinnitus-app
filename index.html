  <!-- ═══ Settings button wire (header) ═══ -->
  <script>
    (function () {
      var btn = document.getElementById('settingsBtn');
      if (!btn) return;
      btn.addEventListener('click', function () {
        if (window.Settings && window.Settings.toggle) window.Settings.toggle();
      });
    })();
  </script>

  <!-- ═══ Theme toggle (chat.php 1:1) ═══ -->
  <script>
    (function () {
      var themeBtn = document.getElementById('themeBtn');
      var iconMoon = document.getElementById('themeIconMoon');
      var iconSun = document.getElementById('themeIconSun');

      function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        if (theme === 'light') {
          iconMoon.style.display = 'none';
          iconSun.style.display = 'block';
        } else {
          iconMoon.style.display = 'block';
          iconSun.style.display = 'none';
        }
        try { localStorage.setItem('auralis-theme', theme); } catch (_) {}
      }

      var saved = 'dark';
      try { saved = localStorage.getItem('auralis-theme') || 'dark'; } catch (_) {}
      setTheme(saved);

      themeBtn.addEventListener('click', function () {
        var current = document.documentElement.getAttribute('data-theme');
        setTheme(current === 'light' ? 'dark' : 'light');
      });
    })();
  </script>

  <!-- ═══ Brand click → home navigation (универсално) ═══ -->
  <script>
    (function () {
      var brand = document.getElementById('brandHome');
      if (!brand) return;

      function goHome() {
        var s = window.AppState;
        if (!s) return;

        if (s.isOnboardingDone() && s.isQuizDone()) {
          // Onboarding + Quiz приключени → HOME (primary per BIBLE v3.1 §N2)
          s.transition('home');
          history.pushState({ phase: 'home' }, '');
          if (window.Home && window.Home.render) window.Home.render();
          else if (window.Library && window.Library.render) window.Library.render();
          else if (window.Mixer && window.Mixer.render) window.Mixer.render();
          else if (window.Quiz && window.Quiz.render) window.Quiz.render();
        } else {
          // Иначе → onboarding welcome (изчисти стари quiz отговори за clean restart)
          if (typeof s.resetQuiz === 'function') s.resetQuiz();
          s.transition('onboarding');
          s.transitionSubphase('welcome');
          history.pushState({ phase: 'onboarding', subphase: 'welcome' }, '');
          if (window.Onboarding && window.Onboarding.render) window.Onboarding.render();
        }
      }

      brand.addEventListener('click', goHome);
      brand.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          goHome();
        }
      });
    })();
  </script>
