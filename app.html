  <!-- ═══ Theme toggle (chat.php 1:1) ═══ -->
  <script>
    (function () {
      var themeBtn = document.getElementById('themeBtn');
      var iconMoon = document.getElementById('themeIconMoon');
      var iconSun = document.getElementById('themeIconSun');

      function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        if (theme === 'light') {
          iconMoon.style.display = 'none';
          iconSun.style.display = 'block';
        } else {
          iconMoon.style.display = 'block';
          iconSun.style.display = 'none';
        }
        try { localStorage.setItem('auralis-theme', theme); } catch (_) {}
      }

      var saved = 'dark';
      try { saved = localStorage.getItem('auralis-theme') || 'dark'; } catch (_) {}
      setTheme(saved);

      themeBtn.addEventListener('click', function () {
        var current = document.documentElement.getAttribute('data-theme');
        setTheme(current === 'light' ? 'dark' : 'light');
      });
    })();
  </script>

  <!-- ═══ Brand click → home navigation (универсално) ═══ -->
  <script>
    (function () {
      var brand = document.getElementById('brandHome');
      if (!brand) return;

      function goHome() {
        var s = window.AppState;
        if (!s) return;

        if (s.isOnboardingDone() && s.isQuizDone()) {
          // Onboarding + Quiz приключени → HOME (primary per BIBLE v3.1 §N2)
          s.transition('home');
          history.pushState({ phase: 'home' }, '');
          if (window.Home && window.Home.render) window.Home.render();
          else if (window.Library && window.Library.render) window.Library.render();
          else if (window.Mixer && window.Mixer.render) window.Mixer.render();
          else if (window.Quiz && window.Quiz.render) window.Quiz.render();
        } else {
          // P0-5 FIX: НЕ извикваме resetQuiz() от brand-home click. Преди
          // това случаен click на brand триеше quiz progress (потвърден bug).
          // Reset е експлицитен — само от Settings → "Започни отначало".
          // Тук просто навигираме към текущата фаза (онбординг или quiz).
          if (s.isOnboardingDone()) {
            // Onboarding done но quiz не — отиди към quiz current step.
            s.transition('quiz');
            history.pushState({ phase: 'quiz' }, '');
            if (window.Quiz && window.Quiz.render) window.Quiz.render();
          } else {
            // Не е onboarding done — върни в onboarding welcome (без reset).
            s.transition('onboarding');
            s.transitionSubphase('welcome');
            history.pushState({ phase: 'onboarding', subphase: 'welcome' }, '');
            if (window.Onboarding && window.Onboarding.render) window.Onboarding.render();
          }
        }
      }

      brand.addEventListener('click', goHome);
      brand.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          goHome();
        }
      });
    })();
  </script>

  <!-- ═══ Service Worker — register + PERSISTENT update button ═══ -->
  <!--
    Защо persistent button, а не auto-reload:
    Standalone PWA (home-screen icon) НЕ е надежден с auto-reload — resume
    от background не trigger-ва navigation, а pull-to-refresh сервира cached
    shell (cache-first). Затова user-ът оставаше със стар код "залепен" на
    екрана (напр. volume slider stuck на 50%).

    Нов модел — version handshake:
      • CODE_VERSION = версията на КОДА който се върти СЕГА (тази HTML страница).
      • Питаме активния SW за неговата VERSION (GET_VERSION → VERSION).
      • Ако SW.VERSION !== CODE_VERSION → SW вече е cache-нал НОВ код →
        показваме persistent "Обнови" бутон. Tap → reload → нов код от cache.
      • Бутонът се показва на ВСЯКО отваряне докато не се натисне (re-check
        при load И при visibilitychange resume).
    ВАЖНО: при всеки release CODE_VERSION трябва да === SW VERSION.
  -->
  <script>
    if ('serviceWorker' in navigator) {
      (function () {
        var CODE_VERSION = '1.0.134';   // ← sync с service-worker.js VERSION при всеки release
        var refreshing = false;
        var reg = null;

        function injectStyles() {
          if (document.getElementById('sw-update-style')) return;
          var st = document.createElement('style');
          st.id = 'sw-update-style';
          st.textContent =
            '#sw-update-bar{position:fixed;left:12px;right:12px;' +
            'top:calc(env(safe-area-inset-top,0px) + 10px);z-index:99999;' +
            'display:flex;align-items:center;gap:12px;padding:12px 14px;' +
            'border-radius:16px;background:hsla(255,30%,14%,0.92);' +
            '-webkit-backdrop-filter:blur(18px) saturate(1.2);' +
            'backdrop-filter:blur(18px) saturate(1.2);' +
            'border:1px solid hsla(255,45%,72%,0.20);' +
            'box-shadow:0 12px 34px hsla(255,50%,4%,0.55);' +
            'transform:translateY(-150%);opacity:0;' +
            'transition:transform .42s cubic-bezier(.22,1,.36,1),opacity .42s ease;' +
            "font-family:'Montserrat',system-ui,sans-serif;}" +
            '#sw-update-bar.sw-show{transform:translateY(0);opacity:1;}' +
            '#sw-update-bar .sw-txt{flex:1;color:#eef0ff;font-size:14px;' +
            'font-weight:600;line-height:1.3;}' +
            '#sw-update-bar .sw-btn{flex:none;border:0;cursor:pointer;' +
            'padding:10px 20px;border-radius:999px;font-family:inherit;' +
            'font-size:14px;font-weight:800;color:#0a0b12;' +
            'background:linear-gradient(135deg,hsl(255 80% 78%),hsl(222 85% 72%));' +
            'box-shadow:0 4px 14px hsla(255,70%,50%,0.40);' +
            'transition:transform .12s ease;' +
            '-webkit-tap-highlight-color:transparent;}' +
            '#sw-update-bar .sw-btn:active{transform:scale(.93);}';
          document.head.appendChild(st);
        }

        function applyUpdate() {
          if (refreshing) return;
          refreshing = true;
          // SW вече е активен и е cache-нал новите файлове → обикновен reload
          // зарежда новия код. Ако случайно има waiting worker — събуди го.
          try { if (reg && reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' }); } catch (e) {}
          window.location.reload();
        }

        function showUpdateBar() {
          injectStyles();
          if (document.getElementById('sw-update-bar')) return;
          var bar = document.createElement('div');
          bar.id = 'sw-update-bar';
          bar.setAttribute('role', 'alert');
          var txt = document.createElement('span');
          txt.className = 'sw-txt';
          txt.textContent = (window.i18n && window.i18n.t) ? window.i18n.t('ui.update.available', 'Налична е нова версия') : 'Налична е нова версия';
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'sw-btn';
          btn.textContent = (window.i18n && window.i18n.t) ? window.i18n.t('ui.update.button', 'Обнови') : 'Обнови';
          btn.addEventListener('click', applyUpdate);
          bar.appendChild(txt);
          bar.appendChild(btn);
          (document.body || document.documentElement).appendChild(bar);
          requestAnimationFrame(function () { bar.classList.add('sw-show'); });
        }

        // Питай активния SW коя версия cache-ва; mismatch → show button.
        function checkVersion() {
          var ctrl = navigator.serviceWorker.controller;
          if (!ctrl) return;                 // първи install — няма стар код
          if (document.getElementById('sw-update-bar')) return;
          try {
            var mc = new MessageChannel();
            mc.port1.onmessage = function (ev) {
              if (ev.data && ev.data.type === 'VERSION' &&
                  ev.data.version && ev.data.version !== CODE_VERSION) {
                showUpdateBar();
              }
            };
            ctrl.postMessage({ type: 'GET_VERSION' }, [mc.port2]);
          } catch (e) {}
        }

        window.addEventListener('load', function () {
          navigator.serviceWorker.register('service-worker.js').then(function (registration) {
            reg = registration;
            // Форсирай проверка за нова версия на сървъра при всяко отваряне.
            try { reg.update(); } catch (e) {}
            // Ако нов worker се активира докато сме отворени → re-check версия.
            navigator.serviceWorker.addEventListener('controllerchange', function () {
              setTimeout(checkVersion, 50);
            });
            checkVersion();
          }).catch(function () {});
        });

        // PWA resume (reopen от background) → пак провери за нова версия,
        // така бутонът се показва на ВСЯКО отваряне докато не се натисне.
        document.addEventListener('visibilitychange', function () {
          if (document.visibilityState !== 'visible') return;
          if (reg) { try { reg.update(); } catch (e) {} }
          checkVersion();
        });
      })();
    }
  </script>
