<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AURALIS</title>
  <style>
    html, body {
      margin: 0; height: 100%;
      background: #0b0d12; color: #e8eaf0;
      font-family: -apple-system, system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center;
      text-align: center;
    }
    .wrap { padding: 24px; max-width: 320px; }
    h1 { font-size: 22px; font-weight: 600; margin: 0 0 12px; letter-spacing: 0.5px; }
    p { font-size: 15px; line-height: 1.5; opacity: 0.7; margin: 0 0 20px; }
    button {
      background: #4a6cf7; color: #fff; border: 0;
      padding: 12px 24px; border-radius: 12px;
      font-size: 15px; font-weight: 600;
    }
  </style>
</head>
<body>
  <!--
    Fallback страница. Показва се САМО ако живият сайт (server.url) е недостъпен.
    При нормална работа Capacitor зарежда https://tinnitus-app.help и този файл не се вижда.
  -->
  <div class="wrap">
    <h1>AURALIS</h1>
    <p>Няма връзка със сървъра. Провери интернет връзката си и опитай отново.</p>
    <button onclick="location.href='https://tinnitus-app.help'">Опитай отново</button>
  </div>
</body>
</html>
